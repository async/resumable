version: 2

goal:
  title: "Framework-Grade Native TSRX Roadmap"
  slug: "framework-grade-roadmap"
  kind: existing_plan
  tranche: "Convert the framework-grade native TSRX roadmap into verified implementation progress toward a compiler front-end that framework authors can build on."
  status: active
  oracle:
    signal: "native-tsrx has moved beyond marker capture into a source-backed, tested compiler foundation with token-aware parsing, structured TSRX AST/IR, real lowering, diagnostics/source maps, framework adapter surfaces, conformance evidence, and performance benchmarks."
    cadence: "after each milestone Worker package and at phase boundaries"
    final_proof: "Final Judge/PM receipt maps completed receipts and verification to every roadmap pillar in docs/framework-grade-roadmap.md, with full_outcome_complete: true or explicit blocked evidence for any infeasible pillar."
  intake:
    original_request: "Give us a GoalBuddy board for framework-grade-roadmap based on the native TSRX roadmap and the need for native performance in .tsrx frameworks."
    interpreted_outcome: "Create an executable GoalBuddy board that turns the roadmap into safe, verified implementation phases for native-tsrx."
    input_shape: existing_plan
    audience: "Jack and future native-tsrx framework/compiler contributors"
    authority: requested
    proof_type: test
    completion_proof: "The board exists, validates cleanly, and subsequent execution produces verified implementation receipts against each framework-grade roadmap pillar."
    likely_misfire: "Continuing to add marker-only normalization cases and mistaking that for framework-grade compiler infrastructure."
    blind_spots_considered:
      - "The current native-tsrx project is outside this workspace root and implementation tasks may require sandbox escalation."
      - "Oxc API capabilities and limitations may shape whether TSRX extensions live in a side table, merged AST, or separate IR."
      - "Framework-grade value depends on AST/IR/lowering/source maps/conformance/performance, not just parsing examples."
      - "A Rolldown-native path may require upstream API research or future plugin surfaces."
    existing_plan_facts:
      - "Roadmap source lives at /Users/jacksm5pro/dev/open-source/native-tsrx/docs/framework-grade-roadmap.md."
      - "Current prototype is an Oxc-backed normalizer/marker layer."
      - "The next valuable milestone is native TSRX AST plus Oxc bridge."
      - "Framework authors need structured nodes for @if, @for, styles, dynamic tags, lazy reads, and target lowering."
      - "Milestones include parser credibility, AST/tooling contract, lowering MVP, framework adapter API, styles/assets, and Rolldown/Vite performance."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: T131


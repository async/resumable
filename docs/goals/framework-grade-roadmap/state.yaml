      - "docs/goals/framework-grade-roadmap/goal.md"
      - "docs/goals/framework-grade-roadmap/state.yaml"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Do not choose another marker-only syntax case unless it directly unlocks structured AST/IR work."
      - "Prefer the largest safe useful first slice that creates framework-grade structure."
    expected_output:
      - "Decision: approved | revise | blocked."
      - "Assessment of whether the first milestone should be parser crate split, AST model, tokenizer, or Oxc bridge."
      - "Exact first Worker objective."
      - "allowed_files for the first Worker."
      - "verify commands."
      - "stop_if conditions."
      - "Risks and deferred roadmap pillars."
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      rationale: "The roadmap is valid and the current implementation is still marker/normalizer-centric. The first useful slice should create durable compiler structure: split the parser-facing code into modules and add a structured TSRX extension side table while preserving the existing parse_tsrx API and tests."
      assessment:
        first_milestone: "AST model plus parser module split."
        not_first: "Full token-aware scanner, lowering, CSS pipeline, and Rolldown integration are deferred until structured extension data exists."
        reason: "A tokenizer-first rewrite would be higher risk and harder to verify in one safe slice. An AST side table gives framework authors a real data surface now and creates a place for later token-aware parsing to land."
      worker_objective: "Create the parser credibility foundation: split parser-facing modules and introduce a structured native TSRX AST model without breaking the current API."
      allowed_files:
        - "/Users/jacksm5pro/dev/open-source/native-tsrx/**"
        - "docs/goals/framework-grade-roadmap/**"
      verify:
        - "cargo fmt --manifest-path /Users/jacksm5pro/dev/open-source/native-tsrx/Cargo.toml --check"
        - "cargo test --manifest-path /Users/jacksm5pro/dev/open-source/native-tsrx/Cargo.toml"
        - "npm test --prefix /Users/jacksm5pro/dev/open-source/native-tsrx"
      stop_if:
        - "Need to change public TypeScript semantics without a compatibility plan."
        - "Need files outside allowed_files."
        - "Oxc AST ownership/lifetime constraints make the selected AST bridge design impossible."
      risks:
        - "The first AST side table will still be derived from the current scanner, not from a fully token-aware parser."
        - "Adding structured extension data must not remove the legacy syntax marker API because current NAPI consumers and tests use it."


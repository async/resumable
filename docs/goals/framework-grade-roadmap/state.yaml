    reasoning_hint: high
    objective: "Validate the roadmap against current native-tsrx state and select the first safe Worker package toward native TSRX AST plus Oxc bridge."
    inputs:
      - "/Users/jacksm5pro/dev/open-source/native-tsrx/docs/framework-grade-roadmap.md"
      - "/Users/jacksm5pro/dev/open-source/native-tsrx/docs/spec-status.md"
      - "/Users/jacksm5pro/dev/open-source/native-tsrx/src/lib.rs"

version: 2

goal:
  title: "Native TSRX Rust Parser"
  slug: "native-tsrx"
  kind: existing_plan
  tranche: "Create a source-backed native TSRX Rust/Oxc project with project-local Codex rules/skills, TDD fixtures from TSRX examples, parser implementation, and TypeScript/NAPI exposure."
  status: done
  oracle:
    signal: "A source-backed native-tsrx project exists with .codex/ gitignored, rules/skills created before implementation, TSRX website examples captured as fixtures, native parser tests passing, and a verified TypeScript/NAPI API."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final Judge/PM receipt maps research, generated .codex files, scaffold, fixtures, Rust parser tests, and TypeScript/NAPI verification commands to the original request with full_outcome_complete: true."
  intake:
    original_request: "Create native-tsrx from latest TSRX docs/examples, Ripple TSRX package, and Satteri; add project .codex rules/skills first; then implement Rust/Oxc parser with TDD fixtures and TypeScript exposure."
    interpreted_outcome: "Build a new source-backed Rust/Oxc native TSRX project under /Users/jacksm5pro/dev/open-source/native-tsrx with Codex project guidance, tests, parser code, and TypeScript exposure."
    input_shape: existing_plan
    audience: "Jack and future native-tsrx contributors"
    authority: requested
    proof_type: test
    completion_proof: "The new native-tsrx project exists, .codex/ is gitignored, project-local rules/skills exist and were created before parser implementation, captured TSRX website examples are fixtures, Rust parser tests pass, and TypeScript/NAPI exposure is verified."
    likely_misfire: "Building a generic Rust parser or NAPI crate without source-backed TSRX behavior, project-local Codex guidance, or full example fixtures."
    blind_spots_considered:
      - "The target sibling directory is outside the current writable root and may require an approved sandbox escalation."
      - "The latest TSRX website and GitHub source research must happen during /goal, not during goal prep."
      - "Oxc AST compatibility and semantic integration may force an adapter or fork decision."
      - "The .codex rules and skills must be generated before parser implementation starts."
      - "Fixtures need source provenance so example drift can be audited later."
    existing_plan_facts:
      - "Create a new project named native-tsrx in /Users/jacksm5pro/dev/open-source."
      - "Collect the latest TSRX specification and examples from https://tsrx.dev."
      - "Inspect https://github.com/Ripple-TS/ripple/tree/main/packages/tsrx directly."
      - "Inspect https://github.com/bruits/satteri for the analogous Satteri approach."
      - "Use Rust Oxc ecosystem crates such as oxc_parser and oxc_semantic."
      - "Expose the native implementation back to TypeScript."
      - "Create project-local .codex rules and skills before implementation based on TSRX and Satteri research."
      - "Use TDD for each part of native-tsrx implementation."
      - "Use each TSRX website example as a test fixture."
      - "Make sure .codex is .gitignored."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/native-tsrx/"
